name: Deploy GitHub Access

on:
  workflow_dispatch:

jobs:
  deploy-github-access:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache Maven wrapper and dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
          key: deploy-github-access-${{ runner.os }}-mvn--${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            deploy-github-access-${{ runner.os }}-
      - name: 'Set up JDK'
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'maven'
      - name: build jar
        run: |
          pushd functions/github-access
          ../../mvnw -B -V package
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
      - name: Validate SECRET_KEY length
        env:
          SECRET_KEY: ${{ secrets.GH_ACCESS_SECRET_KEY }}
        run: |
          # SECRET_KEY must decode (URL-safe base64, no padding) to exactly 16 bytes
          # for AES-128. Catch a wrong-length secret here so the deploy never
          # reaches GCP with a key that would crash the function at startup.
          decoded_len=$(printf '%s' "$SECRET_KEY" | tr '_-' '/+' | base64 --decode 2>/dev/null | wc -c | tr -d ' ')
          if [ "$decoded_len" != "16" ]; then
            echo "::error::SECRET_KEY decoded to $decoded_len bytes, must be 16 (AES-128). Regenerate via functions/github-access/src/test/groovy/KeyGen.groovy."
            exit 1
          fi
      - id: Deploy
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
          GITHUB_REDIRECT_URI: https://access.groovyconsole.dev/
          SECRET_KEY: ${{ secrets.GH_ACCESS_SECRET_KEY }}
          FRONTEND_ORIGIN: https://groovyconsole.dev
        run: |
          gcloud functions deploy github-access --gen2 --entry-point gwc.github.GithubAccessExecutor \
          --runtime java21 --trigger-http --memory 8192MB --allow-unauthenticated --source functions/github-access/target/deployment \
          --region europe-west1 --service-account github-access-sa@gwc-experiment.iam.gserviceaccount.com \
          --set-env-vars "GITHUB_CLIENT_ID=$GITHUB_CLIENT_ID,GITHUB_CLIENT_SECRET=$GITHUB_CLIENT_SECRET,GITHUB_REDIRECT_URI=$GITHUB_REDIRECT_URI,SECRET_KEY=$SECRET_KEY,FRONTEND_ORIGIN=$FRONTEND_ORIGIN"
